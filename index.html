<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fax Routing Guide</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f4f8;
    --surface: #ffffff;
    --border: #d5e0ec;
    --text: #0a1f44;
    --muted: #5e7a99;
    --accent: #1a5fa8;
    --accent-light: #e6f0fb;
    --danger: #b84040;
    --danger-light: #fdf0f0;
    --warn: #7a5c00;
    --warn-light: #fdf4e0;
    --tag-bg: #e8eff7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }

  /* ── HEADER ─────────────────────────────────────── */
  header {
    background: #0a1f44;
    color: #fff;
    padding: 16px 28px;
    display: flex;
    align-items: center;
    gap: 18px;
    flex-wrap: wrap;
    border-bottom: 3px solid #1a5fa8;
  }
  header .logo-area { display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 200px; }
  header h1 { font-size: 15px; font-weight: 500; opacity: 0.8; letter-spacing: 0.2px; }
  header .meta { font-size: 11px; opacity: 0.45; }
  header img { height: 38px; width: auto; background: #fff; border-radius: 6px; padding: 4px 10px; }

  /* ── SEARCH BAR ──────────────────────────────────── */
  .search-wrap {
    padding: 16px 28px 0;
    max-width: 480px;
  }
  .search-wrap input {
    width: 100%;
    padding: 9px 14px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    font-family: inherit;
    font-size: 13.5px;
    background: var(--surface);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }

  /* ── FILTER PILLS ────────────────────────────────── */
  .filter-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    padding: 12px 28px 0;
  }
  .pill {
    padding: 5px 12px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.12s;
    user-select: none;
  }
  .pill:hover { border-color: var(--accent); color: var(--accent); }
  .pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .pill.delete-pill.active { background: var(--danger); border-color: var(--danger); }

  /* ── MAIN CONTENT ────────────────────────────────── */
  main { padding: 20px 28px 60px; }

  .section { margin-bottom: 28px; }
  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1.5px solid var(--border);
  }
  .section-title {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
  }
  .te-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 4px;
    letter-spacing: 0.5px;
  }
  .te-badge.required { background: var(--accent-light); color: var(--accent); }
  .te-badge.delete { background: var(--danger-light); color: var(--danger); }

  /* ── ROUTE CARDS ─────────────────────────────────── */
  .cards { display: flex; flex-direction: column; gap: 8px; }

  .card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 13px 16px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 24px;
    transition: border-color 0.15s;
  }
  .card:hover { border-color: #c8c5be; }
  .card.delete-card {
    border-left: 3px solid var(--danger);
    background: var(--danger-light);
  }
  .card.te-card {
    border-left: 3px solid var(--accent);
  }
  .card.hidden { display: none; }

  .doc-type {
    font-weight: 600;
    font-size: 13.5px;
    grid-column: 1 / -1;
  }

  .field { display: flex; flex-direction: column; gap: 2px; }
  .field-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    color: var(--muted);
  }
  .field-value { font-size: 13px; }
  .field-value.mono {
    font-family: 'DM Mono', monospace;
    font-size: 11.5px;
    background: var(--tag-bg);
    padding: 3px 7px;
    border-radius: 4px;
    display: inline-block;
  }
  .field-value.send-to {
    font-weight: 600;
    color: var(--accent);
  }
  .field-value.delete {
    font-weight: 600;
    color: var(--danger);
  }
  .note {
    grid-column: 1 / -1;
    font-size: 12px;
    color: var(--muted);
    background: var(--tag-bg);
    border-radius: 4px;
    padding: 6px 9px;
    line-height: 1.5;
  }
  .note.hp { background: var(--warn-light); color: var(--warn); font-weight: 500; }

  .no-results {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 40px 0;
    display: none;
  }

  @media (max-width: 560px) {
    header, .search-wrap, .filter-bar, main { padding-left: 16px; padding-right: 16px; }
    .card { grid-template-columns: 1fr; }
  }
</style>
</head>

// Build filter pills from section names
const allSections = ["All", ...SECTIONS.map(s => s.name)];
let activeFilter = "All";

function buildFilters() {
  const bar = document.getElementById("filterBar");
  allSections.forEach(name => {
    const pill = document.createElement("button");
    pill.className = "pill" + (name === "All" ? " active" : "") + (name === "Delete Only — No TE" ? " delete-pill" : "");
    pill.textContent = name === "Delete Only — No TE" ? "Delete Only" : name;
    pill.onclick = () => {
      activeFilter = name;
      document.querySelectorAll(".pill").forEach(p => p.classList.remove("active"));
      pill.classList.add("active");
      render();
    };
    bar.appendChild(pill);
  });
}

function render() {
  const query = document.getElementById("search").value.trim().toLowerCase();
  const main = document.getElementById("main");
  const noResults = document.getElementById("noResults");
  main.innerHTML = "";
  let totalVisible = 0;

  SECTIONS.forEach(section => {
    if (activeFilter !== "All" && activeFilter !== section.name) return;

    const filtered = section.routes.filter(r => {
      if (!query) return true;
      return [r.doc, r.label, r.fileTo, r.sendTo, r.notes].filter(Boolean)
        .some(v => v.toLowerCase().includes(query));
    });

    if (filtered.length === 0) return;
    totalVisible += filtered.length;

    const secDiv = document.createElement("div");
    secDiv.className = "section";

    const badgeHTML = section.teStatus === "required"
      ? `<span class="te-badge required">TE REQUIRED</span>`
      : section.teStatus === "delete"
      ? `<span class="te-badge delete">NO TE · DELETE</span>`
      : "";

    secDiv.innerHTML = `
      <div class="section-header">
        <span class="section-title">${section.name}</span>
        ${badgeHTML}
      </div>
      <div class="cards" id="cards-${section.name.replace(/\W/g,'_')}"></div>
    `;

    const cardsDiv = secDiv.querySelector(".cards");

    filtered.forEach(r => {
      const card = document.createElement("div");
      card.className = "card" + (r.delete ? " delete-card" : r.doc !== undefined && section.teStatus === "required" ? " te-card" : "");

      let html = `<div class="doc-type">${r.doc}</div>`;

      if (r.label) {
        html += `<div class="field">
          <span class="field-label">Label Format</span>
          <span class="field-value mono">${r.label}</span>
        </div>`;
      }

      if (r.fileTo) {
        html += `<div class="field">
          <span class="field-label">File To</span>
          <span class="field-value">${r.fileTo}</span>
        </div>`;
      }

      html += `<div class="field">
        <span class="field-label">Send To</span>
        <span class="field-value ${r.delete ? 'delete' : 'send-to'}">${r.sendTo}</span>
      </div>`;

      if (r.notes) {
        html += `<div class="note${r.hp ? ' hp' : ''}">${r.hp ? '⚑ HP — ' : ''}${r.notes}</div>`;
      }

      card.innerHTML = html;
      cardsDiv.appendChild(card);
    });

    main.appendChild(secDiv);
  });

  noResults.style.display = totalVisible === 0 ? "block" : "none";
}

buildFilters();
render();
</script>
